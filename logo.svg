<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="xBar" x1="24" y1="24" x2="76" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#123f5e"/>
      <stop offset=".55" stop-color="#17618b"/>
      <stop offset="1" stop-color="#2fa9d4"/>
    </linearGradient>
    <linearGradient id="xArrow" x1="25" y1="75" x2="79" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#155a80"/>
      <stop offset=".6" stop-color="#2b9fc9"/>
      <stop offset="1" stop-color="#5fd9f6"/>
    </linearGradient>
  </defs>

  <!-- constellation web -->
  <g fill="none" stroke="#2f9dc4">
    <circle cx="50" cy="50" r="45" stroke-width="1" opacity=".38"/>
    <circle cx="50" cy="50" r="39" stroke-width=".6" opacity=".22"/>
    <polygon points="50,5 88.97,27.5 88.97,72.5 50,95 11.03,72.5 11.03,27.5" stroke-width="1" opacity=".42"/>
    <path d="M50 5 88.97 72.5 11.03 72.5Z" stroke-width=".6" opacity=".2"/>
    <path d="M50 95 11.03 27.5 88.97 27.5Z" stroke-width=".6" opacity=".2"/>
  </g>

  <!-- network nodes -->
  <g fill="#37b6dd">
    <circle cx="50" cy="5" r="2.4"/>
    <circle cx="88.97" cy="27.5" r="2.4"/>
    <circle cx="88.97" cy="72.5" r="2.4"/>
    <circle cx="50" cy="95" r="2.4"/>
    <circle cx="11.03" cy="72.5" r="2.4"/>
    <circle cx="11.03" cy="27.5" r="2.4"/>
    <circle cx="95" cy="50" r="1.5" fill="#7ceafc"/>
    <circle cx="5" cy="50" r="1.5" fill="#7ceafc"/>
    <circle cx="74" cy="4" r="1.2" fill="#7ceafc" opacity=".8"/>
    <circle cx="24" cy="96" r="1.2" fill="#7ceafc" opacity=".8"/>
  </g>

  <!-- X : back bar -->
  <path d="M24 24 76 76" fill="none" stroke="url(#xBar)" stroke-width="13" stroke-linecap="round"/>

  <!-- X : arrow bar -->
  <path d="M25 75 63 37" fill="none" stroke="url(#xArrow)" stroke-width="13" stroke-linecap="round"/>
  <path d="M79 21 72.9 46.9 53.1 27.1Z" fill="#5fd9f6"/>

  <!-- circuit sparks -->
  <g fill="#d8f4fd">
    <circle cx="35" cy="35" r="1.5" opacity=".9"/>
    <circle cx="60" cy="60" r="1.5" opacity=".75"/>
    <circle cx="36" cy="64" r="1.5" opacity=".9"/>
    <circle cx="49" cy="51" r="1.3" opacity=".7"/>
  </g>
</svg>
